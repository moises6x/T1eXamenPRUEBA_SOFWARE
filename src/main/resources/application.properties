# puerto para que el profesor pueda consumir el api
server.port=8080

spring.application.name=infracciones

spring.datasource.url=jdbc:mysql://localhost:3306/infracciones_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


springdoc.swagger-ui.path=/docs
spring.mvc.pathmatch.use-suffix-pattern=false

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always